name: Napkeep
options:
  bundleIdPrefix: com.shimondeitel.naptracker2
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Napkeep:
    type: application
    platform: iOS
    sources:
      - path: Napkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.naptracker2
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Napkeep/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NapkeepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NapkeepTests
      - path: Napkeep.storekit
    dependencies:
      - target: Napkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.naptracker2.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NapkeepUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NapkeepUITests
    dependencies:
      - target: Napkeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.naptracker2.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Napkeep:
    build:
      targets:
        Napkeep: all
        NapkeepTests: [test]
        NapkeepUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Napkeep.storekit
    test:
      config: Debug
      storeKitConfiguration: Napkeep.storekit
      targets:
        - NapkeepTests
        - NapkeepUITests
    archive:
      config: Release
